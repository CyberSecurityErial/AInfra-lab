experiment:
  name: pipeline_small
  purpose: Compare GPipe, 1F1B, Interleaved 1F1B, ZeroBubble 1F1B, a deliberately bad MoE 1F1B overlap, Chimera bidirectional pipelines, DualPipe, and DualPipeV scheduling for a small pipeline.
  expected_trace: GPipe has a full-forward barrier; 1F1B alternates after warmup; Interleaved 1F1B shares each rank across virtual chunks; ZeroBubble moves weight-gradient work into idle slots; bad MoE overlap shows long all-to-all tails as bubbles; Chimera exposes two opposite 1F1B pipelines on mirrored rank lanes; DualPipe and DualPipeV expose paired forward/backward overlap and mirrored-stage rank lanes.

assumptions:
  timing_scope: Synthetic event latency from a CPU-only discrete-event model, not measured framework or GPU time.
  event_model: Every stage/microbatch/pass is represented as recv, compute, then send.
  communication_prior: Forward sends activations downstream and receives from upstream; backward receives gradients from downstream and sends upstream.
  boundary_prior: Stage 0 forward recv, last-stage forward send, last-stage backward recv, and stage 0 backward send are modeled as visible boundary events.
  memory_prior: Forward compute allocates retained activations; backward compute releases them after local compute; gradient buffers live from backward recv through backward send.
  scheduling_prior:
    - gpipe uses all-forward then all-backward flushing with a full-forward barrier.
    - 1f1b uses per-stage warmup, forward/backward alternation, and backward cooldown.
    - interleaved_1f1b splits each physical rank into virtual pipeline chunks, scales compute and activation memory per chunk, and shares the rank lane across chunk-local 1F1B queues.
    - zerobubble_1f1b splits backward into input-gradient B and delayed weight-gradient W. B stays on the pipeline critical path; W is queued and used to fill idle slots before the optimizer step.
    - moe_bad_overlap_1f1b uses the same 1F1B microbatch order but tries a naive MoE component overlap: forward attn/alltoall/mlp/alltoall against backward alltoallB/mlpB/alltoallB/attnB. Long all-to-all tails are counted as exposed pipeline bubbles.
    - chimera splits the configured microbatches across down and up 1F1B pipelines, hosts mirrored stages on each rank lane, and keeps the step synchronous without stale weights.
    - dualpipe uses two boundary-fed directions, mirrored local stages, paired forward/backward overlap, and delayed weight-gradient chunks.
    - dualpipev folds the logical pipeline into a V shape on half as many physical rank lanes and uses the same paired-overlap and delayed-weight abstractions.
  not_modeled:
    - activation memory pressure
    - optimizer step timing
    - tensor-parallel or data-parallel collectives
    - MoE expert-parallel all-to-all kernels and their communication/computation overlap details
    - NCCL protocol details
    - framework graph capture and kernel launch overhead

pipeline:
  stages: 4
  microbatches: 8
  interleaved_virtual_chunks: 2
  stage_compute_scale:
    - 1.0
    - 1.15
    - 0.95
    - 1.05

timing:
  forward_recv_us: 10.0
  forward_compute_us: 80.0
  forward_send_us: 10.0
  backward_recv_us: 10.0
  backward_compute_us: 120.0
  backward_input_compute_us: 80.0
  backward_weight_compute_us: 40.0
  backward_send_us: 10.0
  moe_attn_us: 40.0
  moe_alltoall_us: 180.0
  moe_mlp_us: 70.0
  moe_backward_alltoall_us: 190.0
  moe_backward_mlp_us: 70.0
  moe_backward_attn_us: 50.0

memory:
  static_mb_per_stage: 512.0
  activation_mb_per_microbatch: 256.0
  gradient_mb_per_microbatch: 128.0
  stage_memory_scale:
    - 1.0
    - 1.1
    - 0.9
    - 1.05

simulation:
  modes:
    - gpipe
    - 1f1b
    - interleaved_1f1b
    - zerobubble_1f1b
    - moe_bad_overlap_1f1b
    - chimera
    - dualpipe
    - dualpipev
  trace_unit: us
  emit_flow_events: true
  emit_memory_counters: true
  write_memory_trace: true
